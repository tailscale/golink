{{ define "main" }}
    <h2 class="text-xl font-bold pb-2">Link {{go}}/{{.Short}} Deleted</h2>

    <p class="py-4">Deleted this by mistake? You can recreate the same link below.</p>

    <form method="POST" action="/">
      <input type="hidden" name="xsrf" value="{{ .XSRF }}" />
      <div class="flex flex-wrap">
        <div class="flex">
          <label for=short class="flex my-2 px-2 items-center bg-ctp-mantle border border-r-0 border-ctp-surface2 rounded-l-md text-ctp-subtext0">http://{{go}}/</label>
          <input id=short name=short required type=text size=15 placeholder="shortname" value="{{.Short}}" pattern="\w[\w\-\.]*" title="Must start with letter or number; may contain letters, numbers, dashes, and periods."
            class="p-2 my-2 rounded-r-md border-ctp-surface2 placeholder:text-ctp-overlay1 disabled:bg-ctp-surface1 dark:bg-ctp-surface0 dark:text-ctp-text dark:disabled:bg-ctp-surface1">
          <span class="flex m-2 items-center">&rarr;</span>
        </div>
        <input name=long required type=text size=40 placeholder="https://destination-url" value="{{.Long}}" class="p-2 my-2 mr-2 max-w-full rounded-md border-ctp-surface2 placeholder:text-ctp-overlay1 disabled:bg-ctp-surface1 dark:bg-ctp-surface0 dark:text-ctp-text dark:disabled:bg-ctp-surface1">
      </div>

      <button type=submit class="py-2 px-4 my-2 rounded-md bg-ctp-blue border-ctp-blue text-ctp-base hover:bg-ctp-sapphire hover:border-ctp-sapphire">Create</button>
    </form>
{{ end }}
