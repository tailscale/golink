<!doctype html>
<html lang="en">
    <head>
        <title>{{go}}/</title>
        <link href="/.static/base.css" rel="stylesheet">
        <meta content="width=device-width, initial-scale=1" name="viewport">
        <link href="/.opensearch" rel="search" title="searchTitle" type="application/opensearchdescription+xml"/>
        <link href="/.static/favicon.png" rel="icon">
        <link href="/.static/favicon.svg" rel="icon">
    </head>

    <body class="flex flex-col min-h-screen">
        <div class="bg-gray-100 border-b border-gray-200 pt-4 pb-2 mb-6">
            <header class="container mx-auto px-4">
                <h1 class="text-2xl font-bold pb-1"><a href="/">{{go}}/</a></h1>
                A private shortlink service for your tailnet
            </header>
        </div>

        <main class="container mx-auto px-4 flex-1">
            {{ block "main" .}}{{ end }}
        </main>

        <footer class="bg-gray-100 border-t border-gray-200 pt-2 pb-2 mt-6">
            <div class="container mx-auto px-4 leading-6 text-right">
                From the nerds at
                <a class="inline-block align-text-top" href="https://tailscale.com/">
                    <svg aria-labelledby="tsTitle" fill="none" height="18" role="img" viewBox="0 0 22 22" width="18"
                        xmlns="http://www.w3.org/2000/svg">
                        <title id="tsTitle">Tailscale</title>
                        <circle cx="3.4" cy="3.25" fill="currentColor" opacity="0.2" r="2.7"/>
                        <circle cx="3.4" cy="11.3" fill="currentColor" r="2.7"/>
                        <circle cx="3.4" cy="19.5" fill="currentColor" opacity="0.2" r="2.7"/>
                        <circle cx="11.5" cy="11.3" fill="currentColor" r="2.7"/>
                        <circle cx="11.5" cy="19.5" fill="currentColor" r="2.7"/>
                        <circle cx="11.5" cy="3.25" fill="currentColor" opacity="0.2" r="2.7"/>
                        <circle cx="19.5" cy="3.25" fill="currentColor" opacity="0.2" r="2.7"/>
                        <circle cx="19.5" cy="11.3" fill="currentColor" r="2.7"/>
                        <circle cx="19.5" cy="19.5" fill="currentColor" opacity="0.2" r="2.7"/>
                    </svg>
                </a>
            </div>
        </footer>
    </body>
</html>
