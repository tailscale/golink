{{ define "main" }}
    <h2 class="text-xl font-bold pb-2 dark:text-white">Link {{go}}/{{.Short}} Deleted</h2>

    <p class="py-4 dark:text-gray-200">Deleted this by mistake? You can recreate the same link below.</p>

    <form method="POST" action="/">
      <input type="hidden" name="xsrf" value="{{ .XSRF }}" />
      <div class="flex flex-wrap">
        <div class="flex">
          <label for=short class="flex my-2 px-2 items-center bg-gray-100 dark:bg-gray-700 border border-r-0 border-gray-300 dark:border-gray-600 rounded-l-md dark:text-gray-300">http://{{go}}/</label>
          <input id=short name=short required type=text size=15 placeholder="shortname" value="{{.Short}}" pattern="\w[\w\-\.]*" title="Must start with letter or number; may contain letters, numbers, dashes, and periods."
            class="p-2 my-2 rounded-r-md border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-500 disabled:bg-gray-100 dark:disabled:bg-gray-700">
          <span class="flex m-2 items-center dark:text-gray-300">&rarr;</span>
        </div>
        <input name=long required type=text size=40 placeholder="https://destination-url" value="{{.Long}}" class="p-2 my-2 mr-2 max-w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white placeholder:text-gray-400 dark:placeholder:text-gray-500 disabled:bg-gray-100 dark:disabled:bg-gray-700">
      </div>

      <button type=submit class="py-2 px-4 my-2 rounded-md bg-blue-500 dark:bg-blue-600 border-blue-500 dark:border-blue-700 text-white hover:bg-blue-600 dark:hover:bg-blue-700 hover:border-blue-600 dark:hover:border-blue-800">Create</button>
    </form>
{{ end }}
